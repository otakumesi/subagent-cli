launchers:
  codex:
    backend:
      kind: acp-stdio
    command: npx
    args:
      - -y
      - "@zed-industries/codex-acp"
    env: {}

  claude-code:
    backend:
      kind: acp-stdio
    command: npx
    args:
      - -y
      - "@zed-industries/claude-agent-acp"
    env: {}

  gemini:
    backend:
      kind: acp-stdio
    command: npx
    args:
      - -y
      - "@google/gemini-cli"
      - "--experimental-acp"
    env: {}

  opencode:
    backend:
      kind: acp-stdio
    command: opencode
    args:
      - acp
    env: {}

profiles:
  worker-default:
    promptLanguage: en
    responseLanguage: same_as_manager
    autoHandoff: turn_end
    policyPreset: safe-default
    defaultPacks:
      - repo-conventions
    bootstrap: |
      You are a worker subagent.
      Use STATUS:, ASK:, BLOCKED:, and DONE: prefixes when helpful.
      Keep messages concise and actionable.

packs:
  repo-conventions:
    description: Follow repository coding conventions and keep diffs small.
    prompt: |
      Read existing conventions before editing.
      Prefer minimal, explicit changes.

  python-test-fix:
    description: Fix flaky Python tests with minimal change scope.
    prompt: |
      Reproduce failing tests first.
      Add regression coverage where practical.

policyPresets:
  safe-default:
    filesystem: workspace-write
    network: ask
    dangerousCommands: deny

defaults:
  launcher: codex
  profile: worker-default
  packs:
    - repo-conventions
